version: '3.8'

services:
  # Tier 2: Database
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Tier 1: Flask Web App
  web:
    build: .
    restart: always
    env_file:
      - .env
    environment:
      - DB_HOST=db
    expose:
      - "5000" # Flask ka internal port jo sirf Nginx ko dikhega
    depends_on:
      db:
        condition: service_healthy

  # Reverse Proxy: Nginx (Jo sirf bahar expose hoga)
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80" # Bahar browser me localhost:80 (ya sirf localhost) se access hoga
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web

volumes:
  db_data:
