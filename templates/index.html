<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps Zero to Hero Dashboard</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50 font-sans text-gray-800 antialiased min-h-screen">

    <!-- Navbar -->
    <nav class="bg-indigo-600 text-white shadow-md">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-wide">🚀 DevOps Zero To Hero (Junoon Batch)</h1>
            <span class="bg-indigo-500 text-xs px-3 py-1 rounded-full font-medium">Status: Live</span>
        </div>
    </nav>

    <!-- Main Content Container -->
    <main class="max-w-6xl mx-auto px-4 py-10 grid grid-cols-1 md:grid-cols-3 gap-8">
        
        <!-- Left Side: Add User Form -->
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 h-fit">
            <h2 class="text-lg font-bold text-gray-900 mb-4 flex items-center gap-2">
                ➕ Add New Record
            </h2>
            
            <form action="/add" method="POST" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-1">Username / Name</label>
                    <input type="text" name="username" required placeholder="Ex: Rahul Kumar" 
                           class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-1">Email Address</label>
                    <input type="email" name="email" required placeholder="Ex: rahul@example.com" 
                           class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition">
                </div>
                
                <button type="submit" 
                        class="w-full bg-indigo-600 text-white font-medium py-2.5 px-4 rounded-lg hover:bg-indigo-700 transition duration-200 shadow-sm cursor-pointer">
                    Save Data
                </button>
            </form>
        </div>

        <!-- Right Side: Registered Users List -->
        <div class="md:col-span-2 bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
            <h2 class="text-lg font-bold text-gray-900 mb-4">
                📋 Database Table Records
            </h2>
            
            <div class="overflow-hidden border border-gray-100 rounded-xl">
                <table class="w-full border-collapse text-left text-sm text-gray-500">
                    <thead class="bg-gray-50 text-xs uppercase text-gray-700 font-semibold border-b border-gray-100">
                        <tr>
                            <th scope="col" class="px-6 py-4">ID</th>
                            <th scope="col" class="px-6 py-4">Name</th>
                            <th scope="col" class="px-6 py-4">Email</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-100 border-t border-gray-100">
                        {% if users %}
                            {% for user in users %}
                            <tr class="hover:bg-gray-50 transition">
                                <td class="px-6 py-4 font-medium text-gray-900">#{{ user.id }}</td>
                                <td class="px-6 py-4 font-medium text-gray-900">{{ user.name }}</td>
                                <td class="px-6 py-4">{{ user.email }}</td>
                            </tr>
                            {% endfor %}
                        {% else %}
                            <tr>
                                <td colspan="3" class="px-6 py-10 text-center text-gray-400">
                                    Koi data nahi mila. Pehle side form se add karein!
                                </td>
                            </tr>
                        {% endif %}
                    </tbody>
                </table>
            </div>
        </div>

    </main>

</body>
</html>
